<div class="mb-3">
  <label class="form-label fw-semibold">Bezeichnung <span class="text-danger">*</span></label>
  <input type="text" name="label" class="form-control"
         placeholder="z.B. Temperatur, Betriebsstunden, Ventil offen …" required>
</div>

<div class="row g-3 mb-3">
  <div class="col-sm-6">
    <label class="form-label fw-semibold">Feldtyp <span class="text-danger">*</span></label>
    <select name="field_type" class="form-select">
      {% for key, info in field_types.items() %}
      <option value="{{ key }}">
        {{ info.label }}
      </option>
      {% endfor %}
    </select>
  </div>
  <div class="col-sm-6 unit-row">
    <label class="form-label fw-semibold">Einheit</label>
    <input type="text" name="unit" class="form-control" placeholder="z.B. °C, bar, h …">
  </div>
</div>

<div class="mb-3 options-row d-none">
  <label class="form-label fw-semibold">Auswahloptionen</label>
  <input type="text" name="options" class="form-control"
         placeholder="Kommagetrennt, z.B.: Nein, Ja, Teilweise">
  <div class="form-text">Werte durch Komma trennen.</div>
</div>

<div class="form-check">
  <input class="form-check-input" type="checkbox" name="required" id="req_{{ loop.index if loop else 'new' }}">
  <label class="form-check-label" for="req_{{ loop.index if loop else 'new' }}">Pflichtfeld beim Ablesen</label>
</div>
