version: "3.9"

services:

  # ── Web Application ──────────────────────────────────────────────────────────
  app:
    build: .
    container_name: meter-readings-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      SECRET_KEY: "${SECRET_KEY}"
      DATABASE_URL: "mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - meter_net

  # ── MySQL Database ───────────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    container_name: meter-readings-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${MYSQL_USER}", "--password=${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - meter_net

  # ── phpMyAdmin (optional – remove if not needed) ─────────────────────────────
  phpmyadmin:
    image: phpmyadmin:5
    container_name: meter-readings-pma
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8080}:80"
    environment:
      PMA_HOST: db
      PMA_USER: "${MYSQL_USER}"
      PMA_PASSWORD: "${MYSQL_PASSWORD}"
    depends_on:
      - db
    networks:
      - meter_net

volumes:
  db_data:
  uploads_data:

networks:
  meter_net:
    driver: bridge
